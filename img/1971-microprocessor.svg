  <line x1="130" y1="48" x2="130" y2="112" stroke="rgba(0,174,239,0.3)" stroke-width="0.8"/>
  <line x1="145" y1="48" x2="145" y2="112" stroke="rgba(0,174,239,0.3)" stroke-width="0.8"/>
  <line x1="93" y1="70" x2="167" y2="70" stroke="rgba(0,174,239,0.3)" stroke-width="0.8"/>
  <line x1="93" y1="90" x2="167" y2="90" stroke="rgba(0,174,239,0.3)" stroke-width="0.8"/>
  <!-- Pins left -->
  <rect x="70" y="53" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="70" y="63" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="70" y="73" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="70" y="83" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="70" y="93" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="70" y="103" width="16" height="4" rx="1" fill="#00AEEF"/>
  <!-- Pins right -->
  <rect x="174" y="53" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="174" y="63" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="174" y="73" width="16" height="4" rx="1" fill="#00AEEF"/>
  <rect x="174" y="83" width="16" height="4" rx="1" fill="#00AEEF"/>
