  <rect x="85" y="40" width="90" height="80" rx="4" fill="rgba(255,255,255,0.12)" stroke="#00AEEF" stroke-width="2"/>
  <rect x="93" y="48" width="74" height="64" rx="2" fill="rgba(0,174,239,0.15)" stroke="rgba(0,174,239,0.4)" stroke-width="1"/>
