<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" width="260" height="160">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003C71"/>
      <stop offset="100%" style="stop-color:#3BB54A"/>
    </linearGradient>
  </defs>
  <rect width="260" height="160" fill="url(#bg9)"/>
  <!-- Stage/podium area -->
  <rect x="40" y="95" width="180" height="35" rx="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- People figures (simplified silhouettes) -->
  <!-- Person 1 -->
  <circle cx="75" cy="75" r="10" fill="rgba(255,255,255,0.7)"/>
  <rect x="65" y="86" width="20" height="12" rx="3" fill="rgba(255,255,255,0.6)"/>
  <!-- Person 2 (center, taller = speaker) -->
  <circle cx="130" cy="68" r="12" fill="rgba(255,255,255,0.9)"/>
  <rect x="118" y="81" width="24" height="16" rx="3" fill="rgba(255,255,255,0.8)"/>
  <!-- Person 3 -->
  <circle cx="185" cy="75" r="10" fill="rgba(255,255,255,0.7)"/>
  <rect x="175" y="86" width="20" height="12" rx="3" fill="rgba(255,255,255,0.6)"/>
  <!-- Handshake icon between people -->
  <path d="M95 90 Q113 84 130 90" fill="none" stroke="rgba(59,181,74,0.8)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M130 90 Q147 84 165 90" fill="none" stroke="rgba(59,181,74,0.8)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Banner/screen at top -->
  <rect x="70" y="28" width="120" height="28" rx="4" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="130" y="40" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="bold">INTEL</text>
  <text x="130" y="51" font-family="Arial,sans-serif" font-size="7" fill="rgba(150,255,170,0.9)" text-anchor="middle">SUSTAINABILITY SUMMIT</text>
  <!-- Leaf accents -->
  <ellipse cx="48" cy="110" rx="8" ry="5" fill="rgba(59,181,74,0.5)" transform="rotate(-20 48 110)"/>
  <ellipse cx="212" cy="110" rx="8" ry="5" fill="rgba(59,181,74,0.5)" transform="rotate(20 212 110)"/>
  <text x="130" y="150" font-family="Arial,sans-serif" font-size="11" fill="rgba(200,255,210,0.85)" text-anchor="middle" font-weight="bold">2024 · First Sustainability Summit</text>
</svg>
