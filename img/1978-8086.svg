<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" width="260" height="160">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1654"/>
      <stop offset="100%" style="stop-color:#0071C5"/>
    </linearGradient>
  </defs>
  <rect width="260" height="160" fill="url(#bg3)"/>
  <!-- DIP chip style for 8086 -->
  <rect x="95" y="38" width="70" height="90" rx="3" fill="rgba(40,40,60,0.9)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Notch at top -->
  <ellipse cx="130" cy="38" rx="8" ry="4" fill="rgba(80,80,100,0.9)"/>
  <text x="130" y="76" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="bold">intel</text>
  <text x="130" y="90" font-family="Arial,sans-serif" font-size="9" fill="rgba(200,210,255,0.8)" text-anchor="middle">8086</text>
  <text x="130" y="103" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(160,170,210,0.7)" text-anchor="middle">©1978 Intel Corp</text>
  <!-- Pins top -->
  <rect x="102" y="28" width="4" height="12" rx="1" fill="#888"/>
  <rect x="111" y="28" width="4" height="12" rx="1" fill="#888"/>
  <rect x="120" y="28" width="4" height="12" rx="1" fill="#888"/>
  <rect x="134" y="28" width="4" height="12" rx="1" fill="#888"/>
  <rect x="143" y="28" width="4" height="12" rx="1" fill="#888"/>
  <rect x="152" y="28" width="4" height="12" rx="1" fill="#888"/>
  <!-- Pins bottom -->
  <rect x="102" y="120" width="4" height="12" rx="1" fill="#888"/>
  <rect x="111" y="120" width="4" height="12" rx="1" fill="#888"/>
  <rect x="120" y="120" width="4" height="12" rx="1" fill="#888"/>
  <rect x="134" y="120" width="4" height="12" rx="1" fill="#888"/>
  <rect x="143" y="120" width="4" height="12" rx="1" fill="#888"/>
  <rect x="152" y="120" width="4" height="12" rx="1" fill="#888"/>
  <text x="130" y="150" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">1978 · x86 Architecture Born</text>
</svg>
