<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" width="260" height="160">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003C71"/>
      <stop offset="100%" style="stop-color:#00AEEF"/>
    </linearGradient>
  </defs>
  <rect width="260" height="160" fill="url(#bg4)"/>
  <!-- Square chip for 386 (PGA style) -->
  <rect x="80" y="35" width="100" height="100" rx="4" fill="rgba(20,20,30,0.9)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Inner die -->
  <rect x="94" y="49" width="72" height="72" rx="2" fill="rgba(0,113,197,0.3)" stroke="#00AEEF" stroke-width="1"/>
  <!-- Grid lines on die -->
  <line x1="94" y1="73" x2="166" y2="73" stroke="rgba(0,174,239,0.4)" stroke-width="0.8"/>
  <line x1="94" y1="97" width="72" x2="166" y2="97" stroke="rgba(0,174,239,0.4)" stroke-width="0.8"/>
  <line x1="118" y1="49" x2="118" y2="121" stroke="rgba(0,174,239,0.4)" stroke-width="0.8"/>
  <line x1="142" y1="49" x2="142" y2="121" stroke="rgba(0,174,239,0.4)" stroke-width="0.8"/>
  <text x="130" y="91" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.95)" text-anchor="middle" font-weight="bold">Intel386™</text>
  <text x="130" y="104" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(200,220,255,0.7)" text-anchor="middle">32-BIT</text>
  <!-- Pin dots -->
  <circle cx="86" cy="41" r="2" fill="#aaa"/>
  <circle cx="86" cy="55" r="2" fill="#aaa"/>
  <circle cx="86" cy="69" r="2" fill="#aaa"/>
  <circle cx="86" cy="83" r="2" fill="#aaa"/>
  <circle cx="86" cy="97" r="2" fill="#aaa"/>
  <circle cx="86" cy="111" r="2" fill="#aaa"/>
  <circle cx="174" cy="41" r="2" fill="#aaa"/>
  <circle cx="174" cy="55" r="2" fill="#aaa"/>
  <circle cx="174" cy="69" r="2" fill="#aaa"/>
  <circle cx="174" cy="83" r="2" fill="#aaa"/>
  <circle cx="174" cy="97" r="2" fill="#aaa"/>
  <circle cx="174" cy="111" r="2" fill="#aaa"/>
  <text x="130" y="150" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">1985 · 32-Bit Computing Era</text>
</svg>
