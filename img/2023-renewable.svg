  <!-- 99% badge -->
  <rect x="96" y="126" width="68" height="20" rx="6" fill="rgba(59,181,74,0.9)"/>
  <text x="130" y="140" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">99% Renewable ⚡</text>
  <text x="130" y="12" font-family="Arial,sans-serif" font-size="0" fill="transparent" text-anchor="middle"/>
