    <line x1="16" y1="0" x2="16" y2="30" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="32" y1="0" x2="32" y2="30" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="0" y1="10" x2="48" y2="10" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="0" y1="20" x2="48" y2="20" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <!-- Panel 2 -->
    <rect x="58" y="0" width="48" height="30" rx="2" fill="rgba(0,80,140,0.9)" stroke="rgba(100,200,255,0.5)" stroke-width="1"/>
    <line x1="74" y1="0" x2="74" y2="30" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="90" y1="0" x2="90" y2="30" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="58" y1="10" x2="106" y2="10" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="58" y1="20" x2="106" y2="20" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <!-- Panel 3 -->
    <rect x="116" y="0" width="48" height="30" rx="2" fill="rgba(0,80,140,0.9)" stroke="rgba(100,200,255,0.5)" stroke-width="1"/>
    <line x1="132" y1="0" x2="132" y2="30" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="148" y1="0" x2="148" y2="30" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="116" y1="10" x2="164" y2="10" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
    <line x1="116" y1="20" x2="164" y2="20" stroke="rgba(100,200,255,0.4)" stroke-width="0.8"/>
