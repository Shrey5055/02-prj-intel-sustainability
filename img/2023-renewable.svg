<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" width="260" height="160">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a00"/>
      <stop offset="50%" style="stop-color:#0d5c14"/>
      <stop offset="100%" style="stop-color:#1a6b8a"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#FF9900"/>
    </radialGradient>
  </defs>
  <rect width="260" height="160" fill="url(#bg8)"/>
  <!-- Sun -->
  <circle cx="130" cy="42" r="20" fill="url(#sun)"/>
  <!-- Sun rays -->
  <line x1="130" y1="14" x2="130" y2="8" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="154" y1="20" x2="158" y2="15" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="164" y1="42" x2="170" y2="42" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="154" y1="64" x2="158" y2="69" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="106" y1="20" x2="102" y2="15" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="96" y1="42" x2="90" y2="42" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="106" y1="64" x2="102" y2="69" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
